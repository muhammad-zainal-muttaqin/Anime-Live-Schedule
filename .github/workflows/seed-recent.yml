name: Seed recent seasons

on:
  schedule:
    # Every 6 hours — AniList airing schedules don't change faster than that.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab.

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Seed 5 musim ke Cloudflare KV
        run: node --experimental-strip-types scripts/seed-recent.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
