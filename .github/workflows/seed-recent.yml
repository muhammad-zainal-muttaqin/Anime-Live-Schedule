name: Seed recent seasons

on:
  schedule:
    # Every 6 hours — AniList airing schedules don't change faster than that.
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab.

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Seed 5 musim ke Cloudflare KV
        run: node --experimental-strip-types scripts/seed-recent.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Update search index
        run: node --experimental-strip-types scripts/build-search-index.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit search-index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add public/search-index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update search index [skip ci]"
            git pull --rebase
            git push
          fi
