name: Seed recent seasons

on:
  schedule:
    # Every 3 hours. Cheap now that seeding is write-if-changed — most runs are
    # KV reads (roomy 100k/day bucket) and only the current season, if it moved,
    # actually spends a write (scarce 1000/day bucket).
    - cron: '0 */3 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab.

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Seed 5 musim ke Cloudflare KV
        run: node --experimental-strip-types scripts/seed-recent.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Update search index
        run: node --experimental-strip-types scripts/build-search-index.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit search-index.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add public/search-index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update search index [skip ci]"
            git pull --rebase
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # The committed search-index.json is a static build asset — it only reaches
      # the live worker on a deploy. Redeploy when (and only when) it changed, so
      # the search page stays in sync. KV (grid/countdown) is read at runtime and
      # needs no deploy. Uses the same Cloudflare token as the KV writes.
      - name: Setup pnpm
        if: steps.commit.outputs.changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build & deploy to Cloudflare
        if: steps.commit.outputs.changed == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
